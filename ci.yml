name: CI Safety Gate

on: [push]

# ---------------------------------------------------------------------------
# This file is committed once at Sprint 0 and never modified per story.
# Every job is gated by hashFiles() on its stack's config file — the correct
# jobs activate automatically. No per-story changes are needed.
#
# Mobile jobs (mobile-ios, mobile-android) are gated by the emulator targets
# confirmed in architecture.md Section 8. Set the env vars below at Sprint 0
# to match those confirmed targets. If a target is not confirmed, set to false.
# ---------------------------------------------------------------------------

env:
  IOS_ENABLED: false       # set to true if architecture.md Section 8 iOS Simulator = Yes
  ANDROID_ENABLED: false   # set to true if architecture.md Section 8 Android Emulator = Yes

jobs:

  # -------------------------------------------------------------------------
  # Node — Jest or Vitest + Playwright
  # Activates when: package.json is present
  # -------------------------------------------------------------------------
  test-node:
    if: hashFiles('package.json') != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run check:types
      - name: Unit tests (Jest)
        if: hashFiles('jest.config.*') != ''
        run: npm test -- --passWithNoTests
      - name: Unit tests (Vitest)
        if: hashFiles('vitest.config.*') != ''
        run: npx vitest run
      - name: Web E2E tests (Playwright)
        if: hashFiles('playwright.config.*') != ''
        run: npx playwright install --with-deps && npx playwright test

  # -------------------------------------------------------------------------
  # Python — pytest + flake8 + mypy
  # Activates when: pytest.ini or requirements.txt is present
  # -------------------------------------------------------------------------
  test-python:
    if: hashFiles('pytest.ini') != '' || hashFiles('requirements.txt') != '' || hashFiles('pyproject.toml') != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .[dev]; fi
      - run: flake8 .
      - run: mypy .
      - run: pytest

  # -------------------------------------------------------------------------
  # Go
  # Activates when: go.mod is present
  # -------------------------------------------------------------------------
  test-go:
    if: hashFiles('go.mod') != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  # -------------------------------------------------------------------------
  # Rust
  # Activates when: Cargo.toml is present
  # -------------------------------------------------------------------------
  test-rust:
    if: hashFiles('Cargo.toml') != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo clippy -- -D warnings
      - run: cargo check
      - run: cargo test

  # -------------------------------------------------------------------------
  # Flutter / Dart
  # Activates when: pubspec.yaml is present
  # -------------------------------------------------------------------------
  test-flutter:
    if: hashFiles('pubspec.yaml') != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
      - run: flutter pub get
      - run: dart analyze
      - run: flutter test

  # -------------------------------------------------------------------------
  # Kotlin / Android (Gradle)
  # Activates when: build.gradle or build.gradle.kts is present
  # -------------------------------------------------------------------------
  test-kotlin:
    if: hashFiles('build.gradle') != '' || hashFiles('build.gradle.kts') != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: ./gradlew ktlintCheck
      - run: ./gradlew detekt
      - run: ./gradlew test

  # -------------------------------------------------------------------------
  # iOS / Swift (Xcode)
  # Activates when: an .xcodeproj or .xcworkspace directory is present
  # -------------------------------------------------------------------------
  test-ios:
    if: hashFiles('*.xcodeproj') != '' || hashFiles('*.xcworkspace') != ''
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: swiftlint
      - run: |
          xcodebuild test \
            -scheme "${{ env.XCODE_SCHEME }}" \
            -destination "platform=iOS Simulator,name=iPhone 15,OS=latest" \
            | xcpretty

  # -------------------------------------------------------------------------
  # Mobile E2E — iOS Simulator (Detox)
  # Activates when: IOS_ENABLED env var = true (set at Sprint 0 from architecture.md)
  # -------------------------------------------------------------------------
  mobile-ios:
    if: env.IOS_ENABLED == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Install Detox CLI
        run: npm install -g detox-cli
      - name: Build for Detox
        run: detox build --configuration ios.sim.release
      - name: Run Detox tests
        run: detox test --configuration ios.sim.release --cleanup

  # -------------------------------------------------------------------------
  # Mobile E2E — Android Emulator (Detox)
  # Activates when: ANDROID_ENABLED env var = true (set at Sprint 0 from architecture.md)
  # -------------------------------------------------------------------------
  mobile-android:
    if: env.ANDROID_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Enable KVM (Android emulator hardware acceleration)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - run: npm ci
      - name: Install Detox CLI
        run: npm install -g detox-cli
      - name: Build for Detox
        run: detox build --configuration android.emu.release
      - name: Run Detox tests
        run: detox test --configuration android.emu.release --cleanup
